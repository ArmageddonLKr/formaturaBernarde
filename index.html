<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Formatura — Confirme sua presença</title>
<link rel="icon" href="assets/icons/favicon-32.png">
<meta name="theme-color" content="#0a0a08">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Mrs+Saint+Delafield&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a08;
    --card: #141310;
    --card-2: #1b1a15;
    --ivory: #f2ede1;
    --ivory-dim: #b9b2a1;
    --gold: #c9ab72;
    --gold-deep: #8f7440;
    --border: #322f24;
    --danger: #c98f72;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--ivory);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{max-width: 720px; margin: 0 auto; padding: 0 0 80px;}

  .hero{
    border-bottom: 1px solid var(--border);
  }
  .hero-img{
    width: 100%;
    display: block;
  }

  section{ padding: 44px 28px; }
  .section-head{ text-align:center; margin-bottom: 30px; }
  .section-eyebrow{ font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .section-title{ font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 500; margin:0; }

  .card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 26px;
  }

  label{ display:block; font-size: 12px; letter-spacing: 0.06em; color: var(--ivory-dim); margin: 18px 0 7px; text-transform: uppercase; }
  label:first-of-type{ margin-top: 0; }
  input[type=text], textarea, select{
    width: 100%;
    background: var(--card-2);
    border: 1px solid var(--border);
    color: var(--ivory);
    padding: 12px 14px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    border-radius: 3px;
    outline: none;
    transition: border-color .2s;
  }
  input[type=text]:focus, textarea:focus, select:focus{ border-color: var(--gold-deep); }
  textarea{ resize: vertical; min-height: 70px; }

  .qty-row{ display:flex; align-items:center; gap: 14px; }
  .qty-btn{
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--card-2); border: 1px solid var(--border);
    color: var(--gold); font-size: 18px; cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .qty-btn:active{ transform: scale(0.94); }
  .qty-num{ font-family:'Cormorant Garamond', serif; font-size: 22px; min-width: 30px; text-align:center; }

  .attend-row{ display:flex; gap:10px; }
  .attend-btn{
    flex:1; padding: 12px; text-align:center; border-radius: 3px;
    border: 1px solid var(--border); background: var(--card-2);
    color: var(--ivory-dim); font-size: 14px; cursor:pointer; letter-spacing: 0.03em;
    transition: all .15s;
  }
  .attend-btn.active-yes{ border-color: var(--gold); color: var(--gold); background: rgba(201,171,114,0.08); }
  .attend-btn.active-no{ border-color: var(--danger); color: var(--danger); background: rgba(201,143,114,0.08); }

  .submit-btn{
    width: 100%; margin-top: 24px; padding: 14px;
    background: var(--gold); color: #1a1607; border:none; border-radius: 3px;
    font-family:'Jost', sans-serif; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500; cursor:pointer; transition: background .2s;
  }
  .submit-btn:hover{ background: #d9bd85; }
  .submit-btn:disabled{ opacity: 0.5; cursor: default; }

  .error-msg{ color: var(--danger); font-size: 13px; margin-top: 10px; display:none; }
  .success-box{ text-align:center; padding: 10px 0 4px; display:none; }
  .success-box .check{ font-family:'Cormorant Garamond', serif; font-size: 44px; color: var(--gold); margin-bottom: 6px; }
  .success-box p{ color: var(--ivory-dim); font-size: 14px; margin: 4px 0 0; }

  .decline-note{ text-align:center; font-size: 12px; color: var(--ivory-dim); margin-top: 10px; }

  footer{ text-align:center; padding: 30px 20px 0; color: var(--ivory-dim); font-size: 12px; letter-spacing: 0.08em; }

  @media (max-width: 480px){
    section{ padding: 36px 18px; }
  }

  .js-error-banner{
    display:none; position: sticky; top:0; z-index: 999;
    background: var(--danger); color: #2a1710; text-align:center;
    font-size: 13px; padding: 10px 16px; line-height: 1.4;
  }
</style>
</head>
<body>
<div class="js-error-banner" id="js-error-banner">
  Algo deu errado ao carregar a página. Puxe a tela pra baixo pra atualizar, ou feche e abra de novo.
</div>
<script>
  window.addEventListener('error', function(){
    var el = document.getElementById('js-error-banner');
    if(el) el.style.display = 'block';
  });
</script>
<div class="wrap">

  <div class="hero">
    <img class="hero-img" src="assets/foto-convite.jpg" alt="Convite de formatura — Engenharia de Produção UFPI, 08/08/2026, Auditório Tupperware">
  </div>

  <section id="rsvp-section">
    <div class="section-head">
      <div class="section-eyebrow">RSVP</div>
      <h2 class="section-title">Confirme sua presença</h2>
    </div>
    <div class="card">
      <form id="rsvp-form">
        <label for="f-name">Seu nome</label>
        <input type="text" id="f-name" placeholder="Nome completo" autocomplete="name" required>

        <label>Você vai comparecer?</label>
        <div class="attend-row">
          <div class="attend-btn" id="btn-yes">Sim, estarei lá</div>
          <div class="attend-btn" id="btn-no">Não poderei ir</div>
        </div>

        <div id="qty-block">
          <label>Número de pessoas (incluindo você)</label>
          <div class="qty-row">
            <div class="qty-btn" id="qty-minus">−</div>
            <div class="qty-num" id="qty-display">1</div>
            <div class="qty-btn" id="qty-plus">+</div>
          </div>
        </div>

        <label for="f-msg">Mensagem (opcional)</label>
        <textarea id="f-msg" placeholder="Deixe uma mensagem de carinho"></textarea>

        <button type="submit" class="submit-btn" id="submit-btn">Confirmar presença</button>
        <div class="error-msg" id="error-msg"></div>
      </form>
      <div class="success-box" id="success-box">
        <div class="check">✓</div>
        <p id="success-text">Presença confirmada. Até lá!</p>
      </div>
    </div>
  </section>

  <footer>Minha formatura · 08 de agosto de 2026</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  if(typeof window.supabase === 'undefined'){
    document.write('<script src="https://unpkg.com/@supabase/supabase-js@2"><\/script>');
  }
</script>
<script>
let attending = null;
let qty = 1;

function setAttend(val){
  attending = val;
  document.getElementById('btn-yes').classList.toggle('active-yes', val === true);
  document.getElementById('btn-no').classList.toggle('active-no', val === false);
  document.getElementById('qty-block').style.display = val === true ? 'block' : 'none';
}

function changeQty(delta){
  qty = Math.max(1, Math.min(10, qty + delta));
  document.getElementById('qty-display').textContent = qty;
}

document.getElementById('btn-yes').addEventListener('click', function(){ setAttend(true); });
document.getElementById('btn-no').addEventListener('click', function(){ setAttend(false); });
document.getElementById('qty-minus').addEventListener('click', function(){ changeQty(-1); });
document.getElementById('qty-plus').addEventListener('click', function(){ changeQty(1); });

// ==== Credenciais do Supabase (projeto já criado) ====
const SUPABASE_URL = 'https://fvnwhqelqwoppuhkvpww.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2bndocWVscXdvcHB1aGt2cHd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTEzNTEsImV4cCI6MjA5ODg4NzM1MX0.g5vZxug1pqydYKLhtXEKiBEM7b6Q20m4M93OePw0jJU';
let supabase = null;
try{
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}catch(err){
  console.error('Não foi possível iniciar a conexão com o Supabase', err);
}

document.getElementById('rsvp-form').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorEl = document.getElementById('error-msg');
  errorEl.style.display = 'none';
  const name = document.getElementById('f-name').value.trim();

  if(!name){
    errorEl.textContent = 'Por favor, informe seu nome.';
    errorEl.style.display = 'block';
    return;
  }
  if(attending === null){
    errorEl.textContent = 'Por favor, informe se você vai comparecer.';
    errorEl.style.display = 'block';
    return;
  }
  if(!supabase){
    errorEl.textContent = 'Não foi possível conectar ao servidor. Verifique sua internet e recarregue a página.';
    errorEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try{
    const { error } = await supabase.from('confirmacoes').insert({
      nome: name,
      presenca: attending,
      qtd_pessoas: attending ? qty : 0,
      mensagem: document.getElementById('f-msg').value.trim() || null
    });

    if(error) throw error;

    document.getElementById('rsvp-form').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
    document.getElementById('success-text').textContent = attending
      ? 'Presença confirmada. Até lá!'
      : 'Obrigado por avisar. Sentiremos sua falta!';
  }catch(err){
    errorEl.textContent = 'Não foi possível enviar agora. Tente novamente.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Confirmar presença';
    console.error(err);
  }
});
</script>
</body>
</html>
