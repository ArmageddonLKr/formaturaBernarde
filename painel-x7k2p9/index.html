<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bernard — Confirmações da Formatura</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a08">
<link rel="icon" href="../assets/icons/favicon-32.png">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bernard">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a08;
    --card: #141310;
    --card-2: #1b1a15;
    --ivory: #f2ede1;
    --ivory-dim: #b9b2a1;
    --gold: #c9ab72;
    --gold-deep: #8f7440;
    --border: #322f24;
    --danger: #c98f72;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--ivory);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{max-width: 720px; margin: 0 auto; padding: 44px 28px 80px;}

  .page-head{ text-align:center; margin-bottom: 34px; }
  .eyebrow-top{
    font-size: 12px; letter-spacing: 0.18em; color: var(--ivory-dim);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .page-title{
    font-family: 'Cormorant Garamond', serif; font-weight: 500;
    font-size: 34px; margin: 0; color: var(--ivory);
  }

  .stats-row{ display:flex; gap: 14px; margin-bottom: 30px; }
  .stat{ flex:1; text-align:center; background: var(--card); border:1px solid var(--border); border-radius: 4px; padding: 18px 8px; }
  .stat-num{ font-family:'Cormorant Garamond', serif; font-size: 32px; color: var(--gold); }
  .stat-label{ font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ivory-dim); margin-top: 4px; }

  .toolbar{ display:flex; justify-content:flex-end; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .refresh-btn{
    background: var(--card-2); border: 1px solid var(--border); color: var(--gold);
    font-family: 'Jost', sans-serif; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 10px 18px; border-radius: 3px; cursor: pointer; transition: border-color .2s;
  }
  .refresh-btn:hover{ border-color: var(--gold-deep); }
  .refresh-btn:disabled{ opacity: 0.5; cursor: default; }
  .notif-btn.on{ border-color: var(--gold); color: var(--gold); background: rgba(201,171,114,0.1); }

  .guest-list{ border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .guest-row{
    display:flex; justify-content: space-between; align-items:flex-start; gap: 12px;
    padding: 15px 20px; border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .guest-row:last-child{ border-bottom:none; }
  .guest-row:nth-child(even){ background: var(--card-2); }
  .guest-name{ font-family:'Cormorant Garamond', serif; font-size: 18px; color: var(--ivory); }
  .guest-status{ font-size: 12px; letter-spacing: 0.04em; margin-top: 2px; }
  .guest-status.yes{ color: var(--gold); }
  .guest-status.no{ color: var(--danger); }
  .guest-msg{ font-size: 12px; color: var(--ivory-dim); font-style: italic; margin-top: 6px; max-width: 400px; }
  .guest-meta{ text-align:right; white-space: nowrap; flex-shrink: 0; }
  .guest-qty{ font-size: 12px; color: var(--gold); letter-spacing: 0.04em; }
  .guest-time{ font-size: 11px; color: var(--ivory-dim); margin-top: 4px; }
  .empty-state{ text-align:center; color: var(--ivory-dim); font-size: 14px; padding: 30px 20px; font-family:'Cormorant Garamond', serif; font-style: italic; }
  .loading{ text-align:center; color: var(--ivory-dim); font-size: 13px; padding: 20px; }

  .install-toast{
    position: fixed; left: 16px; right: 16px; bottom: 16px;
    max-width: 420px; margin: 0 auto;
    background: var(--card); border: 1px solid var(--gold-deep); border-radius: 6px;
    padding: 16px 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none; gap: 10px; align-items: center; z-index: 1000;
  }
  .install-toast.show{ display: flex; }
  .install-toast-icon{ width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; }
  .install-toast-text{ flex: 1; font-size: 13px; color: var(--ivory); line-height: 1.4; }
  .install-toast-actions{ display:flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .install-toast-btn{
    background: var(--gold); color: #1a1607; border:none; border-radius: 3px;
    font-family:'Jost', sans-serif; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 8px 12px; cursor: pointer; white-space: nowrap;
  }
  .install-toast-dismiss{
    background: transparent; color: var(--ivory-dim); border:none;
    font-family:'Jost', sans-serif; font-size: 11px; cursor: pointer; padding: 4px;
  }

  .js-error-banner{
    display:none; position: sticky; top:0; z-index: 999;
    background: var(--danger); color: #2a1710; text-align:center;
    font-size: 13px; padding: 10px 16px; line-height: 1.4;
  }
</style>
</head>
<body>
<div class="js-error-banner" id="js-error-banner"></div>
<script>
  window.addEventListener('error', function(e){
    var el = document.getElementById('js-error-banner');
    if(!el) return;
    var detalhe = e && e.message ? e.message : 'erro desconhecido';
    if(e && e.filename){ detalhe += ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')'; }
    el.textContent = 'Algo deu errado: ' + detalhe + '. Puxe a tela pra baixo pra atualizar, ou feche e abra de novo.';
    el.style.display = 'block';
  });
</script>
<div class="wrap">

  <div class="page-head">
    <div class="eyebrow-top">Painel admin</div>
    <h1 class="page-title">Confirmações da formatura</h1>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="stat-confirmed">0</div>
      <div class="stat-label">Confirmações</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-people">0</div>
      <div class="stat-label">Pessoas</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="refresh-btn notif-btn" id="notif-btn">Ativar notificações</button>
    <button class="refresh-btn" id="refresh-btn">Atualizar lista</button>
  </div>

  <div class="guest-list" id="guest-list">
    <div class="loading">Carregando lista...</div>
  </div>
</div>

<div class="install-toast" id="install-toast">
  <img class="install-toast-icon" src="../assets/icons/icon-192.png" alt="">
  <div class="install-toast-text">Quer instalar esse painel como um app no seu celular? Fica mais rápido de abrir.</div>
  <div class="install-toast-actions">
    <button class="install-toast-btn" id="install-btn">Instalar</button>
    <button class="install-toast-dismiss" id="install-dismiss">Agora não</button>
  </div>
</div>

<script>
// ==== Credenciais do Supabase (projeto já criado) ====
const SUPABASE_URL = 'https://fvnwhqelqwoppuhkvpww.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2bndocWVscXdvcHB1aGt2cHd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTEzNTEsImV4cCI6MjA5ODg4NzM1MX0.g5vZxug1pqydYKLhtXEKiBEM7b6Q20m4M93OePw0jJU';
let supabase = null;

// Carrega a lib do Supabase de forma assíncrona (sem document.write, que o
// Chrome bloqueia em conexões lentas/2G), com CDN alternativo se o
// principal falhar.
function loadScript(src){
  return new Promise(function(resolve, reject){
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = function(){ reject(new Error('Falha ao carregar ' + src)); };
    document.head.appendChild(s);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDate(iso){
  return new Date(iso).toLocaleString('pt-BR');
}

async function loadGuestList(){
  const listEl = document.getElementById('guest-list');
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  listEl.innerHTML = '<div class="loading">Carregando lista...</div>';

  try{
    if(!supabase) throw new Error('Supabase ainda não conectado');
    const { data, error } = await supabase
      .from('confirmacoes')
      .select('*')
      .order('criado_em', { ascending: false });

    if(error) throw error;

    const entries = data || [];
    const confirmed = entries.filter(e => e.presenca);
    const totalPeople = confirmed.reduce((sum, e) => sum + (e.qtd_pessoas || 0), 0);
    document.getElementById('stat-confirmed').textContent = confirmed.length;
    document.getElementById('stat-people').textContent = totalPeople;

    if(entries.length === 0){
      listEl.innerHTML = '<div class="empty-state">Ninguém confirmou ainda.</div>';
    } else {
      listEl.innerHTML = entries.map(e => `
        <div class="guest-row">
          <div>
            <div class="guest-name">${escapeHtml(e.nome)}</div>
            <div class="guest-status ${e.presenca ? 'yes' : 'no'}">${e.presenca ? 'Vai comparecer' : 'Não poderá ir'}</div>
            ${e.mensagem ? `<div class="guest-msg">"${escapeHtml(e.mensagem)}"</div>` : ''}
          </div>
          <div class="guest-meta">
            <div class="guest-qty">${e.presenca ? (e.qtd_pessoas + (e.qtd_pessoas === 1 ? ' pessoa' : ' pessoas')) : '—'}</div>
            <div class="guest-time">${formatDate(e.criado_em)}</div>
          </div>
        </div>
      `).join('');
    }
  }catch(err){
    listEl.innerHTML = '<div class="empty-state">Não foi possível carregar a lista agora. Toque em "Atualizar lista" para tentar de novo.</div>';
    console.error(err);
  }finally{
    btn.disabled = false;
  }
}

document.getElementById('refresh-btn').addEventListener('click', loadGuestList);

(typeof window.supabase !== 'undefined'
  ? Promise.resolve()
  : loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2')
      .catch(function(){ return loadScript('https://unpkg.com/@supabase/supabase-js@2'); })
).then(function(){
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}).catch(function(err){
  console.error('Não foi possível carregar/iniciar o Supabase', err);
}).finally(function(){
  loadGuestList();
});

// ==== Notificações push (Web Push API) ====
// Chave publica VAPID: segura para expor no cliente, é assim que a Web Push funciona.
const VAPID_PUBLIC_KEY = 'BDp5tBBRmAiz03ZfjKKut3URwqCZjpWXOqFKy_bH9U6nAoX_xLBrQiSCsAL9OYGG5vA7KkZJeTr1sc71sWvMWnU';

function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

function setNotifBtnState(active){
  const btn = document.getElementById('notif-btn');
  btn.classList.toggle('on', active);
  btn.textContent = active ? 'Notificações ativadas ✓' : 'Ativar notificações';
  btn.disabled = active;
}

async function ativarNotificacoes(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    alert('Este navegador não suporta notificações push.');
    return;
  }
  const btn = document.getElementById('notif-btn');
  btn.disabled = true;
  btn.textContent = 'Ativando...';
  try{
    const permission = await Notification.requestPermission();
    if(permission !== 'granted'){
      setNotifBtnState(false);
      alert('Permissão de notificação negada.');
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    const subJson = sub.toJSON();
    const { error } = await supabase.from('push_subscriptions').upsert({
      endpoint: subJson.endpoint,
      keys: subJson.keys
    }, { onConflict: 'endpoint' });
    if(error) throw error;
    setNotifBtnState(true);
  }catch(err){
    setNotifBtnState(false);
    alert('Não foi possível ativar as notificações agora.');
    console.error(err);
  }
}

document.getElementById('notif-btn').addEventListener('click', ativarNotificacoes);

// Registra o service worker só depois que a página terminar de carregar,
// pra não competir por rede/tempo com o carregamento do Supabase (o que
// já causou uma corrida de tempo estranha em teste automatizado).
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(async (reg) => {
      if('PushManager' in window){
        const existing = await reg.pushManager.getSubscription();
        if(existing) setNotifBtnState(true);
      }
      // Verifica na hora se há uma versão nova do app, em vez de esperar
      // o navegador checar sozinho (o que pode levar até 24h).
      reg.update();
    });

    // Quando uma versão nova assume o controle da página, recarrega
    // automaticamente pra garantir que o app mais recente seja exibido.
    let refreshingAfterUpdate = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(refreshingAfterUpdate) return;
      refreshingAfterUpdate = true;
      window.location.reload();
    });
  });
}

// ==== Toast de instalar como app (PWA) ====
let deferredInstallPrompt = null;
const installToast = document.getElementById('install-toast');

window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  const jaEstaInstalado = window.matchMedia('(display-mode: standalone)').matches;
  const jaDispensou = sessionStorage.getItem('install-toast-dismissed');
  if(jaEstaInstalado || jaDispensou) return;
  deferredInstallPrompt = event;
  installToast.classList.add('show');
});

document.getElementById('install-btn').addEventListener('click', async () => {
  installToast.classList.remove('show');
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
});

document.getElementById('install-dismiss').addEventListener('click', () => {
  installToast.classList.remove('show');
  sessionStorage.setItem('install-toast-dismissed', '1');
});

window.addEventListener('appinstalled', () => {
  installToast.classList.remove('show');
});
</script>
</body>
</html>
